<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kapsalon Mooi Haar</title>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script>
    (function(){
      emailjs.init("uqgU5EFcv74CZg8bB");
    })();
  </script>

  <style>
    body {
      margin: 0;
      font-family: Aptos, sans-serif;
      background: white;
    }

    .container {
      max-width: 1400px;
      margin: auto;
      padding: 20px;
    }

    /* HERO */
    .hero {
      position: relative;
    }

    .hero-title {
      position: absolute;
      top: 30px;
      left: 0;
      width: 100%;

      text-align: center;

      font-size: 90px;
      font-weight: bold;
      color: black;

      font-family: "Times New Roman", serif;

      z-index: 2;
    }

    .hero img {
      width: 100%;
      max-height: 550px;
      object-fit: cover;
      border-radius: 16px;
    }

    /* TEKST */
    .intro {
      margin-top: 20px;
      font-size: 18px;
      line-height: 1.7;
      color: #333;
    }

    /* FOTO'S */
    .fotos {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .fotos img {
      width: 320px;
      max-width: 90%;
      border-radius: 12px;
      transition: 0.2s;
    }

    .fotos img:hover {
      transform: scale(1.05);
    }

    /* AFSPRAAK FORMULIER */
    .form-container {
      max-width: 500px;
      margin: 60px auto;
      padding: 20px;
      background: #111;
      color: white;
      border-radius: 12px;
    }

    .form-container h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: white;
      color: black;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #ddd;
    }

    #melding {
      text-align: center;
      margin-top: 10px;
      color: lightgreen;
    }

    /* FOOTER */
    .footer {
      margin-top: 60px;
      background: #111;
      color: white;
      padding: 40px 20px;
    }

    .footer-container {
      max-width: 1200px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 30px;
    }

    .footer p, .footer a {
      color: #ddd;
      text-decoration: none;
    }

    .footer-bottom {
      text-align: center;
      margin-top: 30px;
    }

    .footer-bottom button {
      padding: 12px 20px;
      border: none;
      background: white;
      color: black;
      border-radius: 8px;
      cursor: pointer;
    }

    .footer-bottom button:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- HERO -->
    <div class="form-container">

  <h2>Maak een afspraak 📅</h2>

  <form id="afspraakForm">

    <input type="text" id="naam" placeholder="Naam" required>

    <input type="email" id="email" placeholder="E-mail" required>

    <input type="date" id="datum" required>

    <input type="time" id="tijd" required>

    <button type="submit">Verstuur afspraak</button>

  </form>

  <p id="melding"></p>

</div>

   <!-- FOTO'S -->
<div class="fotos">

  <a href="kappers-voorstellen.html">
    <img src="./kapster plaatje.webp" alt="stijl 1">
  </a>
    <img src="./mannelijke kapper.jpg" alt="stijl 2">

</div>

  <!-- AFSPRAAK FORMULIER -->
  <div class="form-container">
  
    <h2>Maak een afspraak 📅</h2>

    <form onsubmit="return sendForm(event)">

      <input type="text" id="naam" placeholder="Naam" required>
      <input type="email" id="email" placeholder="E-mail" required>
      <input type="date" id="datum" required>
      <input type="time" id="tijd" required>

    <a href="afspraken.html">
      <button type="submit">Verstuur afspraak</button>
     </a>
    </form>

    <p id="melding"></p>

  </div>

  <!-- FOOTER -->
  <footer class="footer">

    <div class="footer-container">

      <div>
        <h2>Kapsalon Mooi Haar</h2>
        <p>Service, advies & persoonlijke aandacht</p>
      </div>

      <div>
        <h3>Contact</h3>
        <p>Fellenoordstraat 1</p>
        <p>4811 TG Breda</p>
        <p>076-5201955</p>
        <p>afspraak@kapsalonmooihaar.nl</p>
      </div>

      <div>
        <h3>Openingstijden</h3>
        <p>Ma — Gesloten</p>
        <p>Di - Vr — 09:00 - 18:00</p>
        <p>Do — 09:00 - 21:00</p>
        <p>Za — 09:00 - 17:00</p>
        <p>Zo — Gesloten</p>
      </div>

    </div>

    <div class="footer-bottom">
      <button onclick="document.getElementById('naam').scrollIntoView({behavior:'smooth'})">
        Maak een afspraak
      </button>
    </div>

  </footer>

  <!-- SCRIPT -->
  <script>

document.getElementById("afspraakForm")
.addEventListener("submit", function(event) {

  event.preventDefault();

  let naam = document.getElementById("naam").value;
  let email = document.getElementById("email").value;
  let datum = document.getElementById("datum").value;
  let tijd = document.getElementById("tijd").value;

  emailjs.send("service_2gjvrq8", "template_igscaf7", {

    naam: naam,
    email: email,
    datum: datum,
    tijd: tijd
	
  })

  .then(function(response) {

    document.getElementById("melding").innerText =
      "Bedankt " + naam + "! Je afspraak is succesvol verstuurd.";

    document.getElementById("afspraakForm").reset();

  }, function(error) {

    document.getElementById("melding").innerText =
      "Er ging iets fout. Probeer opnieuw.";

    console.log(error);

  });

});

</script>

</body>
</html>

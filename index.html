<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brillette</title>
  <style>
    /* Body styling */
    body {
      background-color: lightblue;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    h1, h3 {
      text-align: center;
      margin: 10px 0;
    }

    hr {
      width: 80%;
      border: 1px solid #333;
      margin: 20px 0;
    }

    /* Afbeelding styling */
    .foto img {
      border-radius: 20px;
      max-width: 100%;
      height: auto;
      display: block;
      margin: 20px auto;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .foto img:hover {
      transform: scale(1.05);
    }

    /* Draai-animatie bij klik */
    .draai {
      animation: spin 0.8s ease;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    /* Contact info */
    .contact {
      margin-top: 30px;
      text-align: center;
    }

    .contact a {
      color: #000;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    /* Responsive text voor kleinere schermen */
    @media (max-width: 600px) {
      h1 {
        font-size: 1.8em;
      }
      h3 {
        font-size: 1em;
      }
      .foto img {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>

  <!-- Intro sectie -->
  <div class="intro">
    <h1>Brillette</h1>
    <hr />
    <h3>Brillette is mijn poes. Ze is 3 jaar en een lapjeskat. Ze is heel lui en doet niks anders dan op mijn bed liggen, buiten rondlopen en eten.</h3>
    <h3><a href="./hobbies">Hobbies van Brillette</a></h3>
  </div>

  <!-- Foto sectie -->
  <div class="foto">
    <img src="./FotoBrillette.jpeg" id="foto" alt="Brillette de poes">
  </div>

  <!-- Audio element -->
  <audio id="meowSound" src="./meow.mp3"></audio>

  <!-- Contact sectie -->
  <div class="contact">
    <h3>Maak nu jouw afspraak met Brillette. Contacteer via:</h3>
    <h3>E-mail: <a href="mailto:maxim.treur@icloud.com">maxim.treur@icloud.com</a></h3>
    <h3>Nummer: <a href="tel:+31616152736">+31 6 16152736</a></h3>
  </div>

  <!-- JavaScript -->
  <script>
    const foto = document.getElementById('foto');
    const meow = document.getElementById('meowSound');

    foto.addEventListener('click', () => {
      // geluid opnieuw afspelen
      meow.currentTime = 0;
      meow.play();

      // draai-animatie opnieuw starten
      foto.classList.remove('draai');
      void foto.offsetWidth; // reset animatie
      foto.classList.add('draai');
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brillette</title>

  <!-- FAVICON -->
  <link rel="icon" href="Katicon.png">
  <link rel="apple-touch-icon" href="Katicon.png">

  <style>
    body {
      background-color: lightblue;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Aptos, sans-serif;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    h1, h3 {
      text-align: center;
      margin: 10px 0;
    }

    hr {
      width: 60%;
      border: 1px solid #333;
      margin: 20px auto;
    }

    /* FOTO CONTAINER */
    .fotos {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      margin-top: 20px;
    }

    /* FOTO'S */
    .fotos img {
      width: 250px;
      max-width: 90%;
      height: auto;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .fotos img:hover {
      transform: scale(1.05);
    }

    /* DRAAI ANIMATIE */
    .draai {
      animation: spin 0.8s ease;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* MOBIEL */
    @media (max-width: 600px) {
      .fotos img {
        width: 90%;
      }
    }

    /* CONTACT */
    .contact {
      margin-top: 30px;
      text-align: center;
    }

    .contact a {
      color: #000;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- INTRO -->
  <div class="intro">
    <h1>Brillette en haar vrienden</h1>
    <hr>
    <h3>Brillette is mijn poes. Ze is 3 jaar en een lapjeskat.</h3>
    <h3><a href="../hobbies">➡️ Hobbies van Brillette ⬅️</a></h3>
  </div>

  <!-- FOTO'S -->
  <div class="fotos">
    <img src="./FotoBrillette.jpeg" class="klik-foto" alt="Brillette de poes">
    <img src="./KatvriendBrillette.jpg" class="klik-foto" alt="Guus de kat">
  </div>

  <!-- GELUID -->
  <audio id="meowSound" src="./meow.mp3"></audio>

  <!-- CONTACT -->
  <div class="contact">
    <h3>Contact:</h3>
    <h3>E-mail: <a href="mailto:MM317749@mencialeerling.nl">maxim.treur@icloud.com</a></h3>
  </div>

  <!-- JAVASCRIPT -->
  <script>
    const fotos = document.querySelectorAll('.klik-foto');
    const meow = document.getElementById('meowSound');

    fotos.forEach(foto => {
      foto.addEventListener('click', () => {
        // geluid
        meow.currentTime = 0;
        meow.play();

        // animatie resetten en starten
        foto.classList.remove('draai');
        void foto.offsetWidth;
        foto.classList.add('draai');
      });
    });
  </script>

</body>
</html>

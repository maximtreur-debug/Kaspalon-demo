<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brillette</title>

  <style>
    body {
      background-color: lightblue;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Aptos, sans-serif;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    h1, h3 {
      text-align: center;
      margin: 10px 0;
    }

    hr {
      width: 60%;
      border: 1px solid #333;
      margin: 20px auto;
    }

    /* Afbeelding responsive */
    .foto img {
      width: 100%;
      max-width: 300px;   /* laptop */
      height: auto;
      border-radius: 20px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .foto img:hover {
      transform: scale(1.05);
    }

    /* Draai-animatie */
    .draai {
      animation: spin 0.8s linear;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .contact {
      margin-top: 30px;
      text-align: center;
    }

    .contact a {
      color: black;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <h1>Hobbies</h1>
  <hr>
  <h3>Brillette haar hobby’s</h3>

  <ol>
    <li>Mini-yoga</li>
    <li>Muizenjacht-expert</li>
    <li>Kattenkaraoke</li>
    <li>Boekenwurm</li>
    <li>Schaduwjager</li>
  </ol>

  <h3><a href="../">⬅️ Terug</a></h3>

  <div class="foto">
    <img src="../FotoBrillette.jpeg" id="foto" alt="Brillette de poes">
  </div>

  <audio id="meowSound" src="../meow.mp3"></audio>

  <div class="contact">
    <h3>Contact</h3>
    <h3>E-mail: <a href="mailto:maxim.treur@icloud.com">maxim.treur@icloud.com</a></h3>
    <h3>Nummer: <a href="tel:+31616152736">+31 6 16152736</a></h3>
  </div>

  <script>
    const foto = document.getElementById("foto");
    const geluid = document.getElementById("meowSound");

    foto.addEventListener("click", () => {
      // geluid opnieuw afspelen
      geluid.currentTime = 0;
      geluid.play();

      // animatie resetten en opnieuw starten
      foto.classList.remove("draai");
      void foto.offsetWidth;
      foto.classList.add("draai");
    });
  </script>

</body>
</html>
